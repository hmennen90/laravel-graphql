name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'benchmarks/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
  schedule:
    # Weekly: rebuild only if a newer webonyx has been released since the last deploy,
    # so the comparison chart tracks the current webonyx without needless rebuilds.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether to (re)build. Push/manual runs always proceed; scheduled runs only
  # proceed when a newer stable webonyx exists than the one already on the dashboard —
  # a self-contained gate so no cross-workflow dispatch (and no PAT) is needed.
  gate:
    name: Should rebuild?
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Tolerant of transient network failures: on error these stay empty and the
          # run simply skips (no red gate job just because a fetch blipped).
          latest=$(curl -sS --max-time 20 https://repo.packagist.org/p2/webonyx/graphql-php.json 2>/dev/null \
            | jq -r '[.packages["webonyx/graphql-php"][] | select(.version | test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))][0].version' 2>/dev/null \
            | sed 's/^v//' || true)
          current=$(curl -sS --max-time 20 https://hmennen90.github.io/laravel-graphql/playground/benchmarks.json 2>/dev/null \
            | jq -r '.comparison.comparedVersion // empty' 2>/dev/null | sed 's/^v//' || true)
          echo "latest webonyx: '$latest' | on dashboard: '$current'"
          if [ -n "$latest" ] && [ "$latest" != "$current" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Rebuilding: webonyx $current -> $latest"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping: webonyx unchanged ($current)"
          fi

  build:
    name: Build docs
    needs: gate
    if: ${{ needs.gate.outputs.proceed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tags needed so `git describe` can stamp the released version

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # Everything that feeds the dashboard is generated here, in ONE job on ONE
      # runner, so every number — current phases/scaling, the engine comparison, the
      # per-release history and its webonyx baseline — is measured on the same machine.
      # The committed benchmarks.json is only a bootstrap/file:// fallback; this is the
      # authoritative copy that ships with the site.
      - name: Install webonyx (dev-only, ephemeral — not a committed dependency)
        run: composer require --dev --no-interaction --no-progress webonyx/graphql-php

      - name: Benchmark — current phases/scaling/comparison
        run: |
          VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
          BENCH=docs/playground/benchmarks.json
          composer bench -- --json="$BENCH" --version="${VERSION:-dev}"
          composer bench:vs -- --json="$BENCH"

      - name: Benchmark — per-release history + webonyx baseline (same runner)
        run: |
          BENCH=docs/playground/benchmarks.json
          bash benchmarks/measure-history.sh "$BENCH"
          php benchmarks/vs-webonyx.php --history-baseline="$BENCH"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install "mkdocs-material==9.*"

      - name: Build site
        run: mkdocs build --strict

      - name: Verify playground assets are published
        run: |
          test -f site/playground/playground.html
          test -f site/playground/benchmarks.html
          test -f site/playground/benchmarks.json
          python3 -c "import json; json.load(open('site/playground/benchmarks.json'))"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
