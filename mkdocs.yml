site_name: laravel-graphql
site_description: A hand-written GraphQL engine with first-class Laravel integration.
site_url: https://hmennen90.github.io/laravel-graphql/
repo_url: https://github.com/hmennen90/laravel-graphql
repo_name: hmennen90/laravel-graphql

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Schema (code-first): schema-code-first.md
  - Schema (SDL): schema-sdl.md
  - Laravel Integration: laravel.md
  - Comparison: comparison.md
