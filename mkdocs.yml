site_name: laravel-graphql
site_description: A hand-written GraphQL engine with first-class Laravel integration.
site_url: https://hmennen90.github.io/laravel-graphql/
repo_url: https://github.com/hmennen90/laravel-graphql
repo_name: hmennen90/laravel-graphql

theme:
  name: material
  palette:
    # Follows the operating-system preference by default.
    - media: "(prefers-color-scheme)"
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Light mode.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Schema (code-first): schema-code-first.md
  - Schema (SDL): schema-sdl.md
  - Laravel Integration: laravel.md
  - Eloquent Directives: eloquent.md
  - Validation & Sanitisers: validation.md
  - Apollo Federation: federation.md
  - Comparison: comparison.md
